<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Tools</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20242c;
      --muted: #667085;
      --line: #d9dee8;
      --blue: #2563eb;
      --soft: #fbfcfe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    header {
      padding: 28px 32px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 32px 40px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .tool-card {
      display: block;
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
    }

    .tool-card:hover {
      border-color: #bfdbfe;
      text-decoration: none;
    }

    .tool-card b {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .tool-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      margin-top: 14px;
      min-height: 24px;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--blue);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML Tools</h1>
    <p class="subtitle">Small static browser tools for document rendering, deployment helpers, and lightweight operations.</p>
  </header>

  <main>
    <section class="tool-grid">
      <a class="tool-card" href="tools/markdown-html-renderer/">
        <b>Markdown HTML Renderer</b>
        <p>Render Markdown, preview Mermaid diagrams, and export standalone HTML documents.</p>
        <span class="badge">Static HTML</span>
      </a>
    </section>
  </main>
</body>
</html>
